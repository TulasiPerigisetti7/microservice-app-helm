name: Package & Publish Helm Charts

on:
  push:
    branches: ["master"]

jobs:

  build-package:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint charts
        run: |
          for chart in HelmCharts/*; do
            helm lint "$chart"
          done

      - name: Package charts
        run: |
          mkdir -p dist
          for chart in HelmCharts/*; do
            helm package "$chart" -d dist
          done

      - name: Upload artifact for next job
        uses: actions/upload-artifact@v4
        with:
          name: helm-packages
          path: dist/


  publish:
    runs-on: ubuntu-latest
    needs: build-package   # 👈 ONLY runs if build succeeds

    steps:
      - name: Debug connectivity
        run: |
          echo "Testing VM IP"
          curl -v http://10.0.2.15:9091/artifactory/api/system/ping || true

          echo "Testing localhost"
          curl -v http://localhost:9091/artifactory/api/system/ping || true

      - name: Download packaged charts
        uses: actions/download-artifact@v4
        with:
          name: helm-packages
          path: dist/

      - name: Upload to JFrog
        env:
          JFROG_URL: ${{ secrets.ARTIFACTORY_URL }}
          JFROG_USER: ${{ secrets.ARTIFACTORY_USER_NAME }}
          JFROG_PASSWORD: ${{ secrets.ARTIFACTORY_PASSWORD }}
        run: |
          for file in dist/*.tgz; do
            curl -f -u "$JFROG_USER:$JFROG_PASSWORD" \
              -T "$file" \
              "$JFROG_URL/helm-charts/$(basename $file)"
          done
